app:
  name: "jimeng-auto"
  host: "0.0.0.0"
  port: 18001
  urls:
    jimeng: "https://jimeng.jianying.com/ai-tool/generate"
    gemini: "https://gemini.google.com/app"

browser:
  headless: true
  timeout: 30000
  channel: "chrome"
  width: 1440
  height: 768

task:
  timeout: 180000

storage:
  profile_dir: "cache/profiles"
  image_cache_dir: "cache/images"
  download_cache_dir: "cache/downloads"
  download_url_prefix: "http://localhost:18001"

database:
  # url: "postgresql+asyncpg://postgres:123456@localhost:5432/jimeng"
  url: "postgresql+asyncpg://postgres:123456@192.168.120.224:5432/jimeng"
  pool_size: 10
  max_overflow: 20

scanner:
  enabled: true
  interval: 60
  wait_time: 10
  retry_limit: 3